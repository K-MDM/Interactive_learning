# Nginx configuration for Next.js application (Interactive Learning)

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Optimization settings
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Upstream Next.js app server
    upstream nextjs_app {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name keeelai.com www.keeelai.com;

        # Redirect HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        server_name keeelai.com www.keeelai.com;

        # SSL Certificates (managed by Certbot / Let's Encrypt)
        # ssl_certificate /etc/letsencrypt/live/keeelai.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/keeelai.com/privkey.pem;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Next.js Static Files Cache (_next/static)
        location /_next/static/ {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 365d;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Public Static Assets Cache
        location /public/ {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Main Proxy to Next.js Application
        location / {
            proxy_pass http://nextjs_app;
            proxy_http_version 1.1;
            
            # WebSocket and Connection Headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Host & Forwarding Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
